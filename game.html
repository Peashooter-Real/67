<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - นับ 7 Online</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #a78bfa;
            --bg-dark: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Anuphan', sans-serif; }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .game-header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--glass-border);
            display: flex; gap: 15px; overflow-x: auto;
            scrollbar-width: none;
        }

        .player-bar-item {
            padding: 10px 20px;
            background: var(--glass);
            border-radius: 12px;
            white-space: nowrap;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .player-bar-item.active {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.2);
        }

        .main-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .num-display {
            font-size: 6rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
            margin-bottom: 20px;
        }

        .card-container {
            width: 260px;
            height: 380px;
            perspective: 1000px;
        }

        .card {
            width: 100%; height: 100%;
            background: white; border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 8px solid white;
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card img { width: 100%; height: 75%; object-fit: cover; }
        .card-info { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; color: #1e293b; padding: 10px; }

        .game-controls {
            padding: 30px;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid var(--glass-border);
            display: flex; flex-direction: column; gap: 15px;
            max-width: 600px; margin: 0 auto; width: 100%;
            border-radius: 30px 30px 0 0;
        }

        .number-btns {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;
        }

        .action-btns {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        button {
            height: 55px; border-radius: 12px; border: none; font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: all 0.2s;
            background: var(--glass); color: white; border: 1px solid var(--glass-border);
        }

        button.active {
            background: var(--primary);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.4);
        }

        button:active { transform: scale(0.95); }

        .dir-indicator { color: var(--text-muted); margin-bottom: 10px; }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.3s; }

        @keyframes pop { 0% { transform: scale(0.6) rotate(-10deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
        .pulse { animation: pulse 0.8s infinite alternate ease-in-out; }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .num-display { font-size: 4rem; margin-bottom: 10px; }
            .card-container { width: 180px; height: 260px; }
            .card { border-width: 4px; border-radius: 16px; }
            .card-info h2 { font-size: 0.9rem !important; }
            .number-btns { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .action-btns { gap: 10px; }
            button { height: 48px; font-size: 0.9rem; border-radius: 10px; }
            .game-controls { padding: 20px 15px; border-radius: 24px 24px 0 0; }
            .player-bar-item { padding: 8px 12px; font-size: 0.8rem; }
            #action-prompt { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="game-header" id="players-bar">
        <!-- Players list -->
    </div>

    <div class="main-arena">
        <div style="position: absolute; top: 20px; right: 20px; background: var(--glass); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--text-muted);">
            การ์ดที่เล่นแล้ว: <span id="pile-count" style="color: white; font-weight: 800;">0</span> ใบ
        </div>
        
        <div id="penalty-notif" style="position: absolute; top: 15%; background: var(--danger); color: white; padding: 10px 30px; border-radius: 50px; font-weight: 800; display: none; z-index: 500;" class="pop">
            นับผิด! รับไป 10 ใบ
        </div>

        <div class="dir-indicator" id="dir-icon">
            <i data-lucide="arrow-up"></i>
        </div>
        <div class="num-display" id="current-num">1</div>

        <div class="card-container" id="card-container-ui">
            <div class="card" id="main-card">
                <img id="card-image" src="" style="display: none; pointer-events: none;">
                <div class="card-info" style="pointer-events: none;">
                    <h2 id="card-label" style="font-size: 1.1rem;">เตรียมตัว...</h2>
                    <p id="card-sub" style="font-size: 0.8rem; font-weight: 600; color: var(--primary)"></p>
                </div>
            </div>
        </div>
        
        <div id="turn-actions" style="margin-top: 25px; text-align: center;">
            <div id="action-prompt" style="font-weight: 800; color: var(--primary-hover); font-size: 1.2rem; min-height: 1.5rem;"></div>
        </div>
    </div>

    <div class="game-controls" id="controls-section">
        <div class="number-btns">
            <button onclick="playAction('1')">1</button>
            <button onclick="playAction('2')">2</button>
            <button onclick="playAction('3')">3</button>
            <button onclick="playAction('4')">4</button>
            <button onclick="playAction('5')">5</button>
            <button onclick="playAction('6')">6</button>
            <button onclick="playAction('7')">7</button>
        </div>
        <div class="action-btns">
            <button onclick="playAction('hello')">HELLO</button>
            <button onclick="playAction('เงียบ')">เงียบ (SILENCE)</button>
        </div>
    </div>

    <div class="overlay" id="win-screen">
        <div style="text-align: center; background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 30px; border: 1px solid var(--glass-border);">
            <h1 id="winner-name" style="font-size: 3rem; margin-bottom: 20px;">🏆</h1>
            <p style="margin-bottom: 30px;">ครองตำแหน่งจอมนับเลขที่หนึ่ง!</p>
            <button onclick="window.location.href='index.html'" style="padding: 0 40px; background: var(--primary);">กลับหน้าหลัก</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const username = sessionStorage.getItem('username');

        if (!roomId || !username) window.location.href = 'index.html';

        let isMyTurn = false;

        // Re-join for existing session check if needed, but in this architecture, lobby handles it.
        // We just need to listen for game updates.
        socket.emit('join_room', { roomId, username });

        socket.on('update_game_state', updateUI);
        
        socket.on('penalty_given', ({ username, count }) => {
            const notif = document.getElementById('penalty-notif');
            notif.innerText = `${username} นับผิด! รับไป ${count} ใบ 🃏`;
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 3000);
        });

        socket.on('game_over', (room) => {
            const screen = document.getElementById('win-screen');
            document.getElementById('winner-name').innerText = `🏆 ${room.gameState.winner}`;
            screen.style.display = 'flex';
        });

        socket.on('wrong_move', () => {
            document.getElementById('controls-section').classList.add('shake');
            setTimeout(() => document.getElementById('controls-section').classList.remove('shake'), 300);
        });

        function updateUI(room) {
            const state = room.gameState;
            const players = room.players;
            
            // Player bar
            const bar = document.getElementById('players-bar');
            bar.innerHTML = players.map((p, idx) => `
                <div class="player-bar-item ${state.currentTurn === idx ? 'active' : ''}">
                    <span style="font-weight: 800;">${p.username}</span>
                    <span style="opacity: 0.6; margin-left: 8px;">${p.deck.length} ใบ</span>
                </div>
            `).join('');

            // Gameplay indicators
            document.getElementById('current-num').innerText = state.currentNumber;
            document.getElementById('pile-count').innerText = state.playedPile.length;
            
            const dirIcon = document.querySelector('#dir-icon i');
            dirIcon.setAttribute('data-lucide', state.direction === 1 ? 'arrow-up' : 'arrow-down');
            lucide.createIcons();

            // Card
            const displayCard = state.pendingCard || state.lastCard;
            if (displayCard) {
                const img = document.getElementById('card-image');
                img.src = displayCard.img;
                img.style.display = 'block';
                document.getElementById('card-label').innerText = displayCard.label;
                document.getElementById('card-sub').innerText = (displayCard.count === 2) ? 'X2 DOUBLE!' : '';
                
                const card = document.getElementById('main-card');
                if (state.pendingCard) card.style.borderColor = 'var(--primary)';
                else card.style.borderColor = 'white';
                
                card.classList.remove('pop');
                void card.offsetWidth;
                card.classList.add('pop');
            } else {
                document.getElementById('card-image').style.display = 'none';
                document.getElementById('card-label').innerText = 'คว่ำหน้า...';
                document.getElementById('card-sub').innerText = '';
                document.getElementById('main-card').style.borderColor = 'white';
            }

            // Controls
            const currentPlayer = players[state.currentTurn];
            isMyTurn = currentPlayer && currentPlayer.username === username;
            
            const prompt = document.getElementById('action-prompt');

            if (isMyTurn) {
                prompt.innerText = "🔥 ตาของคุณแล้ว! เลือกแอคชั่น";
            } else {
                prompt.innerText = `รอตาของ ${currentPlayer.username}...`;
            }

            const btns = document.querySelectorAll('.game-controls button');
            btns.forEach(b => {
                if (isMyTurn) b.classList.add('active');
                else b.classList.remove('active');
            });
        }

        function playAction(action) {
            if (!isMyTurn) return;
            socket.emit('play_card', { roomId, action });
        }
    </script>
</body>
</html>
