<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - นับ 7 Online</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #a78bfa;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Anuphan', sans-serif; }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            padding: 40px 20px;
        }

        .lobby-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .lobby-container { grid-template-columns: 1fr; }
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem; font-weight: 800; margin-bottom: 20px;
            background: linear-gradient(to right, #c084fc, #6366f1);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }

        .player-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .player-slot {
            background: var(--glass);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
        }

        .player-slot.occupied {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--primary);
        }

        .player-slot.host::after {
            content: 'HOST';
            position: absolute;
            top: -10px; right: -10px;
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 10px;
        }

        .room-info {
            text-align: left;
        }

        .room-code-box {
            background: var(--bg-dark);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            border: 1px solid var(--glass-border);
        }

        .code {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--primary-hover);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            background: var(--primary-hover);
        }

        button.secondary {
            background: var(--glass);
            border: 1px solid var(--glass-border);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: var(--success);
            color: white;
            margin-bottom: 20px;
        }

        /* Order Preview Modal */
        #order-preview {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="lobby-container">
        <div class="glass-panel">
            <div class="status-badge">กำลังรอผู้เล่น...</div>
            <h1>Lobby ห้องพัก</h1>
            <p style="color: var(--text-muted)">ใครการ์ดหมดก่อนชนะ! รักษาระดับการนับให้ดี</p>
            
            <div class="player-list" id="player-list">
                <!-- Slots -->
            </div>
        </div>

        <div class="glass-panel room-info">
            <h2>ข้อมูลห้อง</h2>
            <div class="room-code-box">
                <span class="code" id="display-room-id">----</span>
                <i data-lucide="hash" size="20"></i>
            </div>
            
            <button class="secondary" id="copy-link-btn" onclick="copyRoomLink()">
                <i data-lucide="copy"></i> คัดลอกลิงก์เชิญ
            </button>

            <div id="host-controls" style="display: none; margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                <p style="font-size: 0.9rem; margin-bottom: 15px; color: var(--text-muted);">ในฐานะหัวหน้าห้อง คุณสามารถเริ่มเกมได้เมื่อมีผู้เล่นอย่างน้อย 2 คน</p>
                <button id="start-btn">
                    <i data-lucide="play"></i> เริ่มเกมเลย!
                </button>
            </div>

            <div id="guest-msg" style="margin-top: 30px; text-align: center; color: var(--text-muted);">
                รอหัวหน้าห้องเริ่มเกม...
            </div>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="order-preview">
        <div class="glass-panel" style="max-width: 400px; width: 90%;">
            <h1>ลำดับการเล่น</h1>
            <div id="order-items"></div>
            <p style="margin-top: 20px; color: var(--primary);">เตรียมตัว... เกมกำลังจะเริ่ม</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const socket = io();
        
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const username = sessionStorage.getItem('username');

        if (!roomId || !username) {
            window.location.href = 'index.html';
        }

        document.getElementById('display-room-id').innerText = roomId;

        socket.emit('join_room', { roomId, username });

        socket.on('room_update', (data) => {
            const { room, isHost } = data;
            
            const playerList = document.getElementById('player-list');
            playerList.innerHTML = '';
            
            // Show 8 slots max
            for(let i=0; i<8; i++) {
                const p = room.players[i];
                if (p) {
                    playerList.innerHTML += `
                        <div class="player-slot occupied ${p.id === room.host ? 'host' : ''}">
                            <i data-lucide="user" size="32"></i>
                            <p style="margin-top: 10px; font-weight: 600;">${p.username}</p>
                            ${p.username === username ? '<p style="font-size: 0.7rem; color: var(--primary)">(คุณ)</p>' : ''}
                        </div>
                    `;
                } else {
                    playerList.innerHTML += `
                        <div class="player-slot" style="opacity: 0.3; border-style: dashed;">
                            <i data-lucide="user-plus" size="32"></i>
                            <p style="margin-top: 10px; font-size: 0.8rem;">ว่าง</p>
                        </div>
                    `;
                }
            }
            lucide.createIcons();

            const isMeHost = room.host === socket.id;
            document.getElementById('host-controls').style.display = isMeHost ? 'block' : 'none';
            document.getElementById('guest-msg').style.display = isMeHost ? 'none' : 'block';
            
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = room.players.length < 2;
        });

        document.getElementById('start-btn').onclick = () => {
            socket.emit('start_game', roomId);
        };

        socket.on('show_order', (room) => {
            const modal = document.getElementById('order-preview');
            const list = document.getElementById('order-items');
            modal.style.display = 'flex';
            list.innerHTML = room.players.map((p, i) => `
                <div style="display: flex; align-items: center; gap: 15px; background: var(--glass); padding: 10px; border-radius: 10px; margin-bottom: 8px;">
                    <div style="width: 24px; height: 24px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800;">${i+1}</div>
                    <div>${p.username}</div>
                </div>
            `).join('');
        });

        socket.on('game_started', () => {
            // Redirect or transition to game state
            // For now, let's just use the same page for game but swap layout
            // Actually, keep it simple: index.html used to handle game. 
            // Let's redirect to game.html
            sessionStorage.setItem('roomData', JSON.stringify({ roomId, username }));
            window.location.href = `game.html?room=${roomId}`;
        });

        function copyRoomLink() {
            const link = `${window.location.origin}/index.html?room=${roomId}`;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.getElementById('copy-link-btn');
                btn.innerText = 'คัดลอกแล้ว!';
                setTimeout(() => {
                    btn.innerHTML = '<i data-lucide="copy"></i> คัดลอกลิงก์เชิญ';
                    lucide.createIcons();
                }, 2000);
            });
        }
    </script>
</body>
</html>
