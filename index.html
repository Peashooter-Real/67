<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นับ 7 Online - เริ่มการนับ!</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #a78bfa;
            --bg-dark: #0f172a;
            --text-main: #f8fafc;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Anuphan', sans-serif; }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .hero {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 20px;
            z-index: 10;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            display: inline-block;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #c084fc, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: var(--text-muted); margin-bottom: 40px; }

        .form-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px;
            color: white;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            width: 100%;
            height: 60px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.5);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--glass);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--glass-border);
            margin: 0 15px;
        }

        /* Floaties for background aesthetic */
        .floater {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            opacity: 0.2;
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(100px, 100px) rotate(360deg); }
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .logo-icon { font-size: 3rem; }
            .form-card { padding: 30px 20px; border-radius: 24px; }
            input { padding: 14px; font-size: 1rem; }
            button { height: 50px; font-size: 1rem; }
            .floater { display: none; } /* Hide floaters on mobile to save space */
        }
    </style>
</head>
<body>

    <!-- Background Decoration -->
    <div class="floater" style="top: 10%; left: 10%; font-size: 10rem;">7</div>
    <div class="floater" style="bottom: 20%; right: 15%; font-size: 8rem; color: var(--primary);">1</div>

    <div class="hero">
        <div class="logo-container">
            <span class="logo-icon">1-2-3...7</span>
            <h1>นับ 7 ออนไลน์</h1>
            <p>เกมวัดสติและความไว เล่นพร้อมกันกับเพื่อนได้ทันที</p>
        </div>

        <div class="form-card">
            <div class="input-group">
                <label>ใส่ชื่อเล่นของคุณ</label>
                <input type="text" id="username" placeholder="เช่น กขค..." maxlength="12">
            </div>

            <div class="button-stack" id="main-actions">
                <button class="btn-primary" onclick="showCreateMode()">
                    <i data-lucide="plus-circle"></i> สร้างห้องใหม่
                </button>
                <div class="divider">หรือ</div>
                <button class="btn-secondary" onclick="showJoinMode()">
                    <i data-lucide="hash"></i> เข้าร่วมด้วยรหัส
                </button>
            </div>

            <!-- Create Mode -->
            <div id="create-mode" style="display: none;">
                <button class="btn-primary" id="confirm-create-btn" onclick="startLobby('create')">
                    ตกลง สร้างห้องเลย
                </button>
                <button class="btn-secondary" style="margin-top: 10px;" onclick="resetMenu()">ยกเลิก</button>
            </div>

            <!-- Join Mode -->
            <div id="join-mode" style="display: none;">
                <div class="input-group">
                    <label>รหัสห้อง 4 หลัก</label>
                    <input type="text" id="join-room-id" placeholder="Ex: 5678" maxlength="4">
                </div>
                <button class="btn-primary" onclick="startLobby('join')">เข้าร่วมตอนนี้</button>
                <button class="btn-secondary" style="margin-top: 10px;" onclick="resetMenu()">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Check URL for room
        const params = new URLSearchParams(window.location.search);
        const autoRoom = params.get('room');
        if (autoRoom) {
            showJoinMode();
            document.getElementById('join-room-id').value = autoRoom;
        }

        function showCreateMode() {
            if (!checkName()) return;
            document.getElementById('main-actions').style.display = 'none';
            document.getElementById('create-mode').style.display = 'block';
        }

        function showJoinMode() {
            if (!checkName()) return;
            document.getElementById('main-actions').style.display = 'none';
            document.getElementById('join-mode').style.display = 'block';
        }

        function resetMenu() {
            document.getElementById('main-actions').style.display = 'flex';
            document.getElementById('join-mode').style.display = 'none';
            document.getElementById('create-mode').style.display = 'none';
        }

        function checkName() {
            const name = document.getElementById('username').value.trim();
            if (!name) {
                alert('กรุณาใส่ชื่อของคุณก่อน');
                return false;
            }
            sessionStorage.setItem('username', name);
            return true;
        }

        function startLobby(mode) {
            const username = sessionStorage.getItem('username');
            let roomId = '';

            if (mode === 'create') {
                roomId = Math.floor(1000 + Math.random() * 9000).toString();
            } else {
                roomId = document.getElementById('join-room-id').value.trim();
                if (roomId.length < 4) {
                    alert('ใส่รหัสห้อง 4 หลัก');
                    return;
                }
            }

            // Redirect to lobby
            window.location.href = `lobby.html?room=${roomId}`;
        }
    </script>
</body>
</html>
